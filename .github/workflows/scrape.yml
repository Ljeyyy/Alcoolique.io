name: Scrape & Deploy AlcoScore

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests pandas

      - name: Lancer le scraper
        run: python scraper.py

      - name: Commit et push alcools.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alcools.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des données"
          git push
